services:
  - type: web
    name: recruiter-hub-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false         # paste manually in Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false         # set to your Vercel URL, e.g. https://recruiter-hub.vercel.app
      - key: SCORE_THRESHOLD
        value: "75.0"
